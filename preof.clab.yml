name: preof

topology:
  nodes:
    h1:
      kind: linux
      image: detnet-preof-lab:ubuntu24
      binds:
        - ./sender-flow.py:/root/sender-flow.py:ro
      exec:
        - ip addr add 10.0.1.1/24 dev eth1
        - ip link set eth1 up

    prf:
      kind: linux
      image: detnet-preof-lab:ubuntu24
      binds:
        - ./prf.py:/root/prf.py:ro
        - ./prf-onepath.py:/root/prf-onepath.py:ro
      exec:
        - ip addr add 10.0.1.254/24 dev eth1
        - ip addr add 10.0.12.1/24 dev eth2
        - ip addr add 10.0.23.1/24 dev eth3
        - ip link set eth1 up
        - ip link set eth2 up
        - ip link set eth3 up
        - ip route add 10.0.14.2/32 via 10.0.12.2
        - ip route add 10.0.25.2/32 via 10.0.23.2

    r1:
      kind: linux
      image: detnet-preof-lab:ubuntu24
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - ip addr add 10.0.12.2/24 dev eth1
        - ip addr add 10.0.14.1/24 dev eth2
        - ip link set eth1 up
        - ip link set eth2 up

    r2:
      kind: linux
      image: detnet-preof-lab:ubuntu24
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - ip addr add 10.0.23.2/24 dev eth1
        - ip addr add 10.0.25.1/24 dev eth2
        - ip link set eth1 up
        - ip link set eth2 up

    pef:
      kind: linux
      image: detnet-preof-lab:ubuntu24
      binds:
        - ./pef-history.py:/root/pef-history.py:ro
      exec:
        - ip addr add 10.0.14.2/24 dev eth1
        - ip addr add 10.0.25.2/24 dev eth2
        - ip addr add 10.0.6.254/24 dev eth3
        - ip link set eth1 up
        - ip link set eth2 up
        - ip link set eth3 up
        - ip route add 10.0.12.0/24 via 10.0.14.1
        - ip route add 10.0.23.0/24 via 10.0.25.1

    h2:
      kind: linux
      image: detnet-preof-lab:ubuntu24
      binds:
        - ./receiver-flow.py:/root/receiver-flow.py:ro
      exec:
        - ip addr add 10.0.6.1/24 dev eth1
        - ip link set eth1 up

  links:
    - endpoints: ["h1:eth1",  "prf:eth1"]
    - endpoints: ["prf:eth2", "r1:eth1"]
    - endpoints: ["r1:eth2",  "pef:eth1"]
    - endpoints: ["prf:eth3", "r2:eth1"]
    - endpoints: ["r2:eth2",  "pef:eth2"]
    - endpoints: ["pef:eth3", "h2:eth1"]
